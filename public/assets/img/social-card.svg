<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1a6360"/>
      <stop offset="100%" stop-color="#0d3533"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="cardYellow" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#e4b84c" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#e4b84c" stop-opacity="0.12"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1080" cy="0" r="380" fill="white" fill-opacity="0.03"/>
  <circle cx="1180" cy="600" r="220" fill="white" fill-opacity="0.025"/>
  <circle cx="-40" cy="580" r="200" fill="white" fill-opacity="0.025"/>

  <!-- Yellow accent bar -->
  <rect x="80" y="78" width="5" height="118" rx="2.5" fill="#e4b84c"/>

  <!-- Brand name -->
  <text x="104" y="168" font-family="'Arial Black', Arial, Helvetica, sans-serif" font-size="80" font-weight="900" fill="white" letter-spacing="-2">DeepCleanz</text>

  <!-- Tagline -->
  <text x="104" y="226" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.75)" letter-spacing="0.2">Professional Home Deep Cleaning Services in Chennai</text>

  <!-- Divider -->
  <rect x="104" y="256" width="420" height="2" rx="1" fill="#e4b84c" fill-opacity="0.5"/>

  <!-- Service tags -->
  <rect x="104" y="278" width="214" height="40" rx="20" fill="rgba(255,255,255,0.09)"/>
  <text x="211" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="15.5" fill="rgba(255,255,255,0.88)">Full House Cleaning</text>

  <rect x="330" y="278" width="176" height="40" rx="20" fill="rgba(255,255,255,0.09)"/>
  <text x="418" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="15.5" fill="rgba(255,255,255,0.88)">Kitchen Cleaning</text>

  <rect x="518" y="278" width="188" height="40" rx="20" fill="rgba(255,255,255,0.09)"/>
  <text x="612" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="15.5" fill="rgba(255,255,255,0.88)">Bathroom Cleaning</text>

  <rect x="718" y="278" width="148" height="40" rx="20" fill="rgba(255,255,255,0.09)"/>
  <text x="792" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="15.5" fill="rgba(255,255,255,0.88)">Sofa Cleaning</text>

  <rect x="878" y="278" width="214" height="40" rx="20" fill="rgba(255,255,255,0.09)"/>
  <text x="985" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="15.5" fill="rgba(255,255,255,0.88)">Move-In Cleaning</text>

  <!-- Google Rating card -->
  <rect x="104" y="352" width="286" height="108" rx="18" fill="url(#card1)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="124" y="390" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.55)">Google Rating</text>
  <text x="124" y="435" font-family="'Arial Black', Arial, sans-serif" font-size="42" font-weight="900" fill="white">4.7</text>
  <text x="196" y="435" font-family="Arial, sans-serif" font-size="30" fill="#fbbc04">★★★★★</text>
  <text x="197" y="457" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.45)">Based on 70 reviews</text>

  <!-- Pay After Service card -->
  <rect x="408" y="352" width="246" height="108" rx="18" fill="url(#cardYellow)" stroke="rgba(228,184,76,0.2)" stroke-width="1"/>
  <text x="531" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.55)">Customer Assurance</text>
  <text x="531" y="422" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-size="26" font-weight="900" fill="#e4b84c">Pay After</text>
  <text x="531" y="452" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-size="26" font-weight="900" fill="#e4b84c">Service</text>

  <!-- Trained Crew card -->
  <rect x="672" y="352" width="246" height="108" rx="18" fill="url(#card1)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="795" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.55)">Our Team</text>
  <text x="795" y="422" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-size="24" font-weight="900" fill="white">Trained Home-</text>
  <text x="795" y="452" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-size="24" font-weight="900" fill="white">Cleaning Crew</text>

  <!-- Same-day callback card -->
  <rect x="936" y="352" width="184" height="108" rx="18" fill="url(#card1)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="1028" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.55)">Response</text>
  <text x="1028" y="422" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-size="24" font-weight="900" fill="white">Same-Day</text>
  <text x="1028" y="452" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-size="24" font-weight="900" fill="white">Callback</text>

  <!-- Bottom bar -->
  <rect x="0" y="572" width="1200" height="58" fill="rgba(0,0,0,0.22)"/>
  <text x="104" y="609" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="rgba(255,255,255,0.5)">deepcleanz.com</text>
  <text x="600" y="609" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="rgba(255,255,255,0.5)">Chennai, Tamil Nadu</text>
  <text x="1096" y="609" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="rgba(255,255,255,0.5)">+91 93636 09470</text>
</svg>
